name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build_backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Build backend (skip tests)
        run: |
          chmod +x mvnw
          ./mvnw -B --no-transfer-progress -DskipTests clean package

  test_backend:
    runs-on: ubuntu-latest
    needs: build_backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: univoyage_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d univoyage_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/univoyage_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_FLYWAY_URL: jdbc:postgresql://localhost:5432/univoyage_test
      SPRING_FLYWAY_USER: postgres
      SPRING_FLYWAY_PASSWORD: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw -B --no-transfer-progress test
