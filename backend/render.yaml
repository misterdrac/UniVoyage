services:
  - type: web
    name: univoyage-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/univoyage-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DB_HOST
        fromDatabase:
          name: univoyage-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: univoyage-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: univoyage-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: univoyage-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: univoyage-db
          property: password
      # Add your API keys here or in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # CORS will be set after frontend is deployed
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: univoyage-db
    databaseName: univoyage_db
    user: univoyage_user
    plan: free

