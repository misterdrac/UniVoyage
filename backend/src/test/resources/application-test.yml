spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/univoyage_test
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Allow flyway.clean() from test FlywayMigrationStrategy (Spring defaults clean-disabled=true).
    clean-disabled: false
    url: jdbc:postgresql://localhost:5432/univoyage_test
    user: postgres
    password: admin

app:
  jwt:
    secret: "thisIsAVeryLongSecretKeyForTestingPurposes1234567890"
    ttl-seconds: 3600
    issuer: "univoyage"
    audience: "web"