spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/univoyage_test
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    # Many @SpringBootTest classes each spin up a context with its own pool; keep
    # this small so full mvn package does not exhaust PostgreSQL max_connections.
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: jdbc:postgresql://localhost:5432/univoyage_test
    user: postgres
    password: admin

app:
  jwt:
    secret: "thisIsAVeryLongSecretKeyForTestingPurposes1234567890"
    ttl-seconds: 3600
    issuer: "univoyage"
    audience: "web"