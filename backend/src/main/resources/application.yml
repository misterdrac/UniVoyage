spring:
  application:
    name: UniVoyage

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:univoyage_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:univoyage_db}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    connect-retries: 10
    connect-retries-interval: 5  # seconds between Flyway connection attempts
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    # SQL is not echoed here; enable PostgreSQL log_statement (see docker-compose) for DB-side query logging.
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: 3600
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
    issuer: univoyage
    audience: web

  auth:
    login:
      # Account lockout: this many consecutive wrong passwords for the same user → locked_until (reset on success or after lock expires).
      max-failed-attempts: 5
      lock-duration: PT15M
      ip-max-attempts: 60
      ip-window: PT1M
      refresh-ip-max-attempts: 120
      refresh-ip-window: PT1M

  cookies:
    # Override via env in production/docker (e.g. COOKIE_SECURE=true)
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAMESITE:Lax}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging:
  level:
    org.springframework.security: INFO
    # Keep Hibernate SQL out of Spring Boot logs; use PostgreSQL server logs for queries.
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

management:
  endpoints:
    web:
      exposure:
        include: health