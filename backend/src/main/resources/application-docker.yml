spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/univoyage_db
    username: postgres
    password: admin

  flyway:
    enabled: true
    url: jdbc:postgresql://postgres:5432/univoyage_db
    user: postgres
    password: admin
    connect-retries: 10
    connect-retries-interval: 5
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

logging:
  file:
    name: /app/logs/univoyage.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN