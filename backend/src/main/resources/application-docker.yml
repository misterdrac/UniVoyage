server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:univoyage_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}

  cors:
    allowed-origins:
      - http://localhost:5173

  cookies:
    secure: false
    same-site: Lax

logging:
  level:
    org.springframework.security: DEBUG
