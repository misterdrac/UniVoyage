spring.application.name=UniVoyage

# PostgreSQL 18 Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:${HOST:localhost}}:${DB_PORT:5432}/${DB_NAME:univoyage_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway Database Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA and Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.ttl-seconds=2592000     
app.jwt.issuer=univoyage
app.jwt.audience=web

spring.mvc.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

spring.mvc.dispatch-options-request=true
logging.level.org.springframework.security=INFO
