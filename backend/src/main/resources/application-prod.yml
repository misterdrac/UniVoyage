server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS} # npr: https://univoyage-frontend.vercel.app
  cookies:
    secure: true
    same-site: None
    domain: ${COOKIE_DOMAIN:} # opcionalno, npr ".univoyage.com" ako imaš subdomene

logging:
  level:
    org.springframework.security: INFO
