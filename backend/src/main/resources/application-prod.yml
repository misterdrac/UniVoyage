server:
  port: ${PORT:8080}
  forward-headers-strategy: framework  # bitno iza reverse proxy (Vercel/Fly/Railway)

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:univoyage_db}}
    username: ${DB_USERNAME:${PGUSER:postgres}}
    password: ${DB_PASSWORD:${PGPASSWORD:admin}}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

  cors:
    # OBAVEZNO puna domena(e), comma-separated:
    # https://univoyage-frontend.vercel.app,https://univoyage.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  cookies:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAMESITE:None}
    domain: ${COOKIE_DOMAIN:}   # ostavi prazno ako nemaš isti apex/subdomain setup

logging:
  level:
    org.springframework.security: INFO
