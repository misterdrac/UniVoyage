server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Prvo gledamo puni URL koji smo stavili u Railway, ako ga nema, tek onda slažemo kockice
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:univoyage_db}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${PGUSER:postgres}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:admin}}}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    # Flyway sada sigurno koristi istu stvar kao i datasource
    url: ${SPRING_DATASOURCE_URL}
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

  cors:
    # Ako zaboraviš varijablu, barem će lokalni frontend raditi
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  cookies:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAMESITE:None}
    domain: ${COOKIE_DOMAIN:}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO