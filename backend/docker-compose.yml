services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: univoyage_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d univoyage_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: univoyage_db
      DB_USERNAME: postgres
      DB_PASSWORD: admin

volumes:
  pgdata:
