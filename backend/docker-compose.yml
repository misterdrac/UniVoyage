services:
  postgres:
    image: postgres:16
    container_name: univoyage_db_container
    restart: unless-stopped
    env_file: .env
    # Default 5433: on Windows, 5432 is often blocked (Hyper-V / excluded port ranges).
    # Override in .env: POSTGRES_HOST_PORT=5432 when 5432 is free on your machine.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Named volume: bind-mounting ./logs/postgres on Docker Desktop (Windows) often makes
      # /var/log/postgresql non-writable for user postgres → crash loop. Inspect with:
      #   docker compose exec postgres tail -n 100 /var/log/postgresql/postgresql.log
      - postgres_logs:/var/log/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c logging_collector=on
      -c log_destination=stderr
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_truncate_on_rotation=on
      -c log_rotation_age=1d
      -c log_rotation_size=50MB
      -c log_min_messages=info
      -c log_min_error_statement=error
      -c log_connections=on
      -c log_disconnections=on
      -c log_statement=none
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d univoyage_db"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build: .
    container_name: univoyage_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-univoyage_db}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-univoyage_db}
    volumes:
      - ./logs/spring:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  postgres_logs:
